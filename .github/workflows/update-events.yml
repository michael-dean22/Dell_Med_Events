name: Update Events

on:
  schedule:
    # Every day at 06:00 and 18:00 UTC (≈ 1am/1pm Austin)
    - cron: '0 6,18 * * *'
  workflow_dispatch:    # allow manual runs from the Actions tab
  push:
    paths:
      - 'data/internal-events.json'
      - 'scripts/build-events.py'
      - '.github/workflows/update-events.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build events
        run: python3 scripts/build-events.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/events.json dell-med-events.ics
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update events feed [skip ci]"
            git push
          fi
