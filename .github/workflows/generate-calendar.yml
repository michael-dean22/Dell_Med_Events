name: Generate Dell Med Events Calendar

on:
  schedule:
    - cron: '0 6 * * *'   # Runs every day at 6am UTC (1am Central)
  workflow_dispatch:        # Also allows manual trigger from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml pytz

      - name: Generate ICS calendar
        run: python generate_calendar.py

      - name: Commit and push updated calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dell-med-events.ics calendar.html
          git diff --staged --quiet || git commit -m "Update calendar $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
