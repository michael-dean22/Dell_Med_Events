<style>

  :root {
    --burnt-orange: #BF5700; --dark-orange: #9D4600; --light-orange: #FDF0E6;
    --public-blue: #1a73e8; --public-blue-light: #E8F3FE;
    --warm-white: #FDFAF7; --charcoal: #1C1C1C; --mid-gray: #6B6B6B;
    --border: #E8DDD3; --row-hover-orange: #FFF5EC; --row-hover-blue: #EBF3FE;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--warm-white); color: var(--charcoal); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
  .header { background: var(--burnt-orange); padding: 11px 16px 10px; display: flex; align-items: center; gap: 10px; border-bottom: 3px solid var(--dark-orange); flex-shrink: 0; }
  .header-title { font-family: 'Source Serif 4', serif; font-size: 1.05rem; font-weight: 600; color: #fff; letter-spacing: -0.01em; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #7FDB8A; flex-shrink: 0; animation: pulse 2s infinite; margin-left: 2px; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
  .header-sub { font-size: 0.65rem; color: rgba(255,255,255,0.7); font-weight: 300; letter-spacing: 0.05em; text-transform: uppercase; margin-left: auto; white-space: nowrap; }
  .source-bar { background: var(--dark-orange); padding: 6px 16px; display: flex; align-items: center; gap: 18px; flex-shrink: 0; border-bottom: 1px solid rgba(0,0,0,0.12); }
  .source-label { font-size: 0.6rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-right: 4px; }
  .source-item { display: flex; align-items: center; gap: 6px; }
  .source-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .source-dot.public { background: var(--public-blue); }
  .source-dot.internal { background: #7FDB8A; }
  .source-name { font-size: 0.65rem; font-weight: 500; color: rgba(255,255,255,0.85); }
  .ticker-viewport { flex: 1; overflow: hidden; position: relative; }
  .ticker-viewport::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40px; background: linear-gradient(to bottom, transparent, var(--warm-white)); pointer-events: none; z-index: 2; }
  .ticker-track { position: absolute; top: 0; left: 0; right: 0; transition: top 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
  .ticker-row { display: flex; align-items: stretch; border-bottom: 1px solid var(--border); cursor: pointer; text-decoration: none; color: inherit; background: transparent; transition: background 0.15s; min-height: 52px; }
  .ticker-row.public:hover { background: var(--row-hover-blue); }
  .ticker-row.internal:hover { background: var(--row-hover-orange); }
  .row-date { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 46px; flex-shrink: 0; border-right: 1px solid var(--border); padding: 6px 4px; }
  .ticker-row.internal .row-date { background: var(--light-orange); }
  .ticker-row.public .row-date { background: var(--public-blue-light); }
  .row-month { font-size: 0.58rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; line-height: 1; }
  .ticker-row.internal .row-month { color: var(--burnt-orange); }
  .ticker-row.public .row-month { color: var(--public-blue); }
  .row-day { font-size: 1.1rem; font-weight: 600; color: var(--charcoal); line-height: 1.1; font-variant-numeric: tabular-nums; }
  .row-body { flex: 1; padding: 8px 10px; display: flex; flex-direction: column; justify-content: center; gap: 3px; min-width: 0; }
  .row-title { font-size: 0.82rem; font-weight: 500; color: var(--charcoal); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
  .ticker-row.internal:hover .row-title { color: var(--burnt-orange); }
  .ticker-row.public:hover .row-title { color: var(--public-blue); }
  .row-meta { font-size: 0.68rem; color: var(--mid-gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge-today { display: inline-block; background: var(--burnt-orange); color: #fff; font-size: 0.55rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 1px 5px; border-radius: 3px; margin-left: 6px; vertical-align: middle; }
  .row-arrow { display: flex; align-items: center; padding: 0 10px 0 4px; flex-shrink: 0; color: var(--mid-gray); opacity: 0; transition: opacity 0.15s; }
  .ticker-row:hover .row-arrow { opacity: 1; }
  .page-footer { border-top: 1px solid var(--border); background: #fff; padding: 6px 14px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .footer-count { font-size: 0.65rem; color: var(--mid-gray); }
  .pause-btn { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 3px 9px; font-size: 0.65rem; color: var(--mid-gray); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s, color 0.15s; }
  .pause-btn:hover { background: var(--light-orange); color: var(--burnt-orange); border-color: var(--burnt-orange); }
  .footer-link { font-size: 0.68rem; color: var(--burnt-orange); text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 3px; }
  .footer-link:hover { text-decoration: underline; }
</style>

const MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
function parseDate(s) { const [y,m,d]=s.split('-').map(Number); const dt=new Date(y,m-1,d); dt.setHours(0,0,0,0); return dt; }

const today = new Date(); today.setHours(0,0,0,0);
const todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

const events = RAW_EVENTS
  .filter(e => parseDate(e.date) >= today)
  .sort((a,b) => parseDate(a.date) - parseDate(b.date));

const track = document.getElementById('track');

events.forEach(ev => {
  const [,m,d] = ev.date.split('-').map(Number);
  const isToday = ev.date === todayStr;
  const isPublic = ev.source === 'public';

  const a = document.createElement('a');
  a.className = 'ticker-row ' + (isPublic ? 'public' : 'internal');
  a.href = ev.url; a.target = '_blank'; a.rel = 'noopener noreferrer';

  const dateDiv = document.createElement('div'); dateDiv.className = 'row-date';
  const monthSpan = document.createElement('span'); monthSpan.className = 'row-month'; monthSpan.textContent = MONTHS[m-1];
  const daySpan = document.createElement('span'); daySpan.className = 'row-day'; daySpan.textContent = d;
  dateDiv.appendChild(monthSpan); dateDiv.appendChild(daySpan);

  const bodyDiv = document.createElement('div'); bodyDiv.className = 'row-body';
  const titleDiv = document.createElement('div'); titleDiv.className = 'row-title'; titleDiv.textContent = ev.title;
  if (isToday) { const badge = document.createElement('span'); badge.className = 'badge-today'; badge.textContent = 'Today'; titleDiv.appendChild(badge); }
  const metaDiv = document.createElement('div'); metaDiv.className = 'row-meta';
  metaDiv.textContent = ev.time + (ev.location ? ' · ' + ev.location : '');
  bodyDiv.appendChild(titleDiv); bodyDiv.appendChild(metaDiv);

  const arrowDiv = document.createElement('div'); arrowDiv.className = 'row-arrow';
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width','12'); svg.setAttribute('height','12'); svg.setAttribute('viewBox','0 0 24 24');
  svg.setAttribute('fill','none'); svg.setAttribute('stroke','currentColor'); svg.setAttribute('stroke-width','2.5');
  svg.setAttribute('stroke-linecap','round'); svg.setAttribute('stroke-linejoin','round');
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polyline'); poly.setAttribute('points','9 18 15 12 9 6');
  svg.appendChild(poly); arrowDiv.appendChild(svg);

  a.appendChild(dateDiv); a.appendChild(bodyDiv); a.appendChild(arrowDiv);
  track.appendChild(a);
});

document.getElementById('footer-count').textContent = events.length + ' upcoming event' + (events.length !== 1 ? 's' : '');

const viewport = document.getElementById('viewport');
const ROW_H = 52, INTERVAL = 1300;
let row = 0, paused = false;

function maxRow() { return Math.max(0, events.length - Math.floor(viewport.clientHeight / ROW_H)); }
function goTo(r) { track.style.top = (-r * ROW_H) + 'px'; }

function advance() {
  if (paused) return;
  row++;
  if (row > maxRow()) {
    row = 0;
    track.style.transition = 'none'; goTo(0);
    requestAnimationFrame(() => requestAnimationFrame(() => { track.style.transition = 'top 0.55s cubic-bezier(0.25,0.46,0.45,0.94)'; }));
    return;
  }
  goTo(row);
}

document.getElementById('pause-btn').addEventListener('click', () => { paused = !paused; document.getElementById('pause-btn').textContent = paused ? '▶ Resume' : '⏸ Pause'; });
viewport.addEventListener('mouseenter', () => { paused = true; });
viewport.addEventListener('mouseleave', () => { paused = false; document.getElementById('pause-btn').textContent = '⏸ Pause'; });
setInterval(advance, INTERVAL);
</script>
